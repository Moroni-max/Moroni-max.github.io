<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon site</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #070714; overflow: hidden; }
    canvas { display: block; }
    #texte {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
    }
    h1 {
      font-family: sans-serif;
      font-size: 72px;
      color: white;
      font-weight: 900;
      letter-spacing: -2px;
    }
    p {
      font-family: sans-serif;
      font-size: 20px;
      color: rgba(150, 200, 255, 0.7);
      margin-top: 16px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="texte">
  <h1>Bonjour le monde</h1>
  <p>Clique et bouge ta souris</p>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const souris = { x: null, y: null };
const NB_POINTS = 120;
const DISTANCE_MAX = 150;
const RAYON_SOURIS = 200;

let points = [];
for (let i = 0; i < NB_POINTS; i++) {
  points.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 1.2,
    vy: (Math.random() - 0.5) * 1.2,
  });
}

window.addEventListener('mousemove', (e) => {
  souris.x = e.clientX;
  souris.y = e.clientY;
});

window.addEventListener('mouseleave', () => {
  souris.x = null;
  souris.y = null;
});

window.addEventListener('click', (e) => {
  for (let i = 0; i < 30; i++) {
    const angle = (Math.PI * 2 / 30) * i;
    const force = Math.random() * 8 + 3;
    points.push({
      x: e.clientX,
      y: e.clientY,
      vx: Math.cos(angle) * force,
      vy: Math.sin(angle) * force,
    });
  }
  if (points.length > 300) {
    points = points.slice(points.length - 300);
  }
});

function dessinerLigne(p1, p2, opacite) {
  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y);
  ctx.lineTo(p2.x, p2.y);
  ctx.strokeStyle = `rgba(100, 180, 255, ${opacite})`;
  ctx.lineWidth = 0.8;
  ctx.stroke();
}

function animer() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  points.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

    if (souris.x !== null) {
      const dx = souris.x - p.x;
      const dy = souris.y - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < RAYON_SOURIS) {
        p.x += dx * 0.03;
        p.y += dy * 0.03;
      }
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(150, 200, 255, 0.8)';
    ctx.fill();
  });

  for (let i = 0; i < points.length; i++) {
    for (let j = i + 1; j < points.length; j++) {
      const dx = points[i].x - points[j].x;
      const dy = points[i].y - points[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < DISTANCE_MAX) {
        const opacite = 1 - dist / DISTANCE_MAX;
        dessinerLigne(points[i], points[j], opacite);
      }
    }
  }

  requestAnimationFrame(animer);
}

animer();
</script>
</body>
</html>
