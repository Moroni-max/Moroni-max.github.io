<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack – Recettes du monde</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#080808;color:#f0f0f0;padding:1rem;max-width:700px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:0.5px solid #1a1a1a}
.back{color:#555;font-size:13px;text-decoration:none}.back:hover{color:#f0f0f0}
.logo-text{font-size:16px;font-weight:900;letter-spacing:-0.5px}.logo-text span{color:#00FF87}

.hero{margin-bottom:1.5rem}
.hero h1{font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:6px}
.hero h1 span{color:#00FF87}
.hero p{font-size:14px;color:#555}

.pays-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem}
.pays-btn{padding:8px 16px;border:1.5px solid #222;border-radius:99px;background:transparent;color:#888;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;display:flex;align-items:center;gap:6px}
.pays-btn:hover{border-color:#444;color:#f0f0f0}
.pays-btn.active{border-color:#00FF87;color:#00FF87;background:rgba(0,255,135,0.05)}

.recettes-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:500px){.recettes-grid{grid-template-columns:1fr}}
.recette-card{background:#111;border:0.5px solid #1a1a1a;border-radius:12px;padding:1rem;cursor:pointer;transition:all 0.2s}
.recette-card:hover{border-color:#333;background:#131313;transform:translateY(-2px)}
.recette-emoji{font-size:28px;margin-bottom:8px}
.recette-nom{font-size:14px;font-weight:700;margin-bottom:4px}
.recette-desc{font-size:12px;color:#555;line-height:1.5;margin-bottom:8px}
.recette-meta{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600}
.tag-kcal{background:rgba(0,255,135,0.1);color:#00FF87}
.tag-time{background:rgba(255,255,255,0.05);color:#666}
.tag-diff{background:rgba(255,165,0,0.1);color:#ffa500}

/* MODAL DETAIL */
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:#111;border:0.5px solid #222;border-radius:16px;padding:1.5rem;max-width:520px;width:100%;max-height:90vh;overflow-y:auto}
.modal-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem}
.modal-emoji{font-size:36px;margin-bottom:8px}
.modal-nom{font-size:20px;font-weight:900;letter-spacing:-0.5px;margin-bottom:4px}
.modal-pays{font-size:12px;color:#555;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.close-btn{background:none;border:none;color:#555;font-size:20px;cursor:pointer;padding:4px;flex-shrink:0}
.close-btn:hover{color:#f0f0f0}
.modal-section{margin-bottom:1rem}
.modal-section-title{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.ingredient-list{display:flex;flex-direction:column;gap:4px}
.ingredient-row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#0d0d0d;border-radius:8px;font-size:13px}
.ingredient-name{color:#f0f0f0}
.ingredient-right{display:flex;gap:8px;align-items:center}
.ingredient-qty{color:#555;font-size:12px}
.ingredient-kcal{color:#00FF87;font-weight:600;font-size:12px}
.total-bar{background:#0d0d0d;border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.total-label{font-size:13px;color:#555;font-weight:600}
.total-val{font-size:18px;font-weight:700;color:#00FF87}
.steps-list{display:flex;flex-direction:column;gap:8px}
.step{display:flex;gap:10px;font-size:13px;line-height:1.6;color:#888}
.step-num{width:22px;height:22px;background:rgba(0,255,135,0.1);color:#00FF87;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.btn-start{width:100%;padding:14px;background:#00FF87;color:#080808;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-top:1rem;letter-spacing:-0.3px}
.btn-start:hover{background:#00e87a}

/* MODE CUISINE */
.cook-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#080808;z-index:200;flex-direction:column}
.cook-bg.open{display:flex}
.cook-header{padding:1rem 1.5rem;border-bottom:0.5px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cook-title{font-size:15px;font-weight:700}
.cook-close{background:none;border:none;color:#555;font-size:18px;cursor:pointer;padding:4px}
.cook-close:hover{color:#f0f0f0}
.cook-progress{padding:0 1.5rem;margin-top:1rem;flex-shrink:0}
.progress-track{height:4px;background:#1a1a1a;border-radius:99px;overflow:hidden;margin-bottom:6px}
.progress-bar{height:100%;background:#00FF87;border-radius:99px;transition:width 0.3s}
.progress-label{font-size:12px;color:#555;font-weight:600}
.cook-body{flex:1;overflow-y:auto;padding:1.5rem}
.cook-step-num{font-size:11px;font-weight:700;color:#00FF87;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.cook-step-text{font-size:22px;font-weight:700;line-height:1.4;letter-spacing:-0.5px;margin-bottom:2rem;color:#f0f0f0}
.cook-ingredients-title{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.cook-ing-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:2rem}
.cook-ing-card{background:#111;border:0.5px solid #1a1a1a;border-radius:10px;padding:12px;text-align:center}
.cook-ing-emoji{font-size:20px;margin-bottom:6px}
.cook-ing-name{font-size:12px;font-weight:600;margin-bottom:4px;color:#f0f0f0}
.cook-ing-qty{font-size:13px;font-weight:700;color:#00FF87}
.cook-ing-kcal{font-size:11px;color:#444;margin-top:2px}
.cook-tip{background:rgba(0,255,135,0.05);border:0.5px solid rgba(0,255,135,0.1);border-radius:10px;padding:12px 14px;font-size:13px;color:#888;line-height:1.6;margin-bottom:1.5rem}
.cook-tip strong{color:#00FF87}
.cook-footer{padding:1rem 1.5rem;border-top:0.5px solid #1a1a1a;display:grid;grid-template-columns:1fr 1fr;gap:10px;flex-shrink:0}
.cook-btn{padding:14px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;border:none;transition:all 0.2s}
.cook-btn-prev{background:#1a1a1a;color:#888}
.cook-btn-prev:hover{background:#222;color:#f0f0f0}
.cook-btn-next{background:#00FF87;color:#080808}
.cook-btn-next:hover{background:#00e87a}
.cook-btn-next:disabled{background:#1a1a1a;color:#444;cursor:not-allowed}
.cook-done{display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3rem 1.5rem;flex:1}
.cook-done-emoji{font-size:64px;margin-bottom:1rem}
.cook-done h2{font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:8px}
.cook-done h2 span{color:#00FF87}
.cook-done p{font-size:14px;color:#555;margin-bottom:2rem}
.cook-done-btn{padding:14px 32px;background:#00FF87;color:#080808;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back">← Accueil</a>
  <div class="logo-text">Fit<span>Track</span></div>
  <span style="font-size:13px;color:#555">Recettes</span>
</div>

<div class="hero">
  <h1>Cuisines du <span>monde</span></h1>
  <p>Explore les recettes, découvre les calories et cuisine étape par étape.</p>
</div>

<div class="pays-grid" id="pays-grid"></div>
<div class="recettes-grid" id="recettes-grid"></div>

<!-- MODAL DETAIL -->
<div class="modal-bg" id="modal-bg" onclick="closeModalOutside(event)">
  <div class="modal" id="modal"></div>
</div>

<!-- MODE CUISINE -->
<div class="cook-bg" id="cook-bg">
  <div class="cook-header">
    <div class="cook-title" id="cook-title"></div>
    <button class="cook-close" onclick="closeCook()">✕</button>
  </div>
  <div class="cook-progress">
    <div class="progress-track"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="progress-label" id="progress-label"></div>
  </div>
  <div class="cook-body" id="cook-body"></div>
  <div class="cook-done" id="cook-done">
    <div class="cook-done-emoji">🎉</div>
    <h2>Recette <span>terminée !</span></h2>
    <p id="cook-done-desc"></p>
    <button class="cook-done-btn" onclick="closeCook()">Retour aux recettes</button>
  </div>
  <div class="cook-footer" id="cook-footer">
    <button class="cook-btn cook-btn-prev" id="cook-prev" onclick="prevStep()">← Précédent</button>
    <button class="cook-btn cook-btn-next" id="cook-next" onclick="nextStep()">Suivant →</button>
  </div>
</div>

<script>
const PAYS=[
  {id:'guadeloupe',nom:'Guadeloupe',flag:'🇬🇵'},
  {id:'senegal',nom:'Sénégal',flag:'🇸🇳'},
  {id:'maroc',nom:'Maroc',flag:'🇲🇦'},
  {id:'comores',nom:'Comores',flag:'🇰🇲'},
  {id:'italie',nom:'Italie',flag:'🇮🇹'},
  {id:'inde',nom:'Inde',flag:'🇮🇳'},
  {id:'turquie',nom:'Turquie',flag:'🇹🇷'},
  {id:'thailand',nom:'Thaïlande',flag:'🇹🇭'},
  {id:'indonesie',nom:'Indonésie',flag:'🇮🇩'},
];

const RECETTES={
  guadeloupe:[
    {nom:"Bokit Poulet",emoji:"🥙",desc:"Pain frit garni de poulet mariné, salade, tomate et sauce chien.",temps:"45 min",diff:"Moyen",portions:1,
    ingredients:[{n:"Farine de blé",q:120,k:350,e:"🌾"},{n:"Poulet mariné grillé",q:150,k:165,e:"🍗"},{n:"Salade verte",q:30,k:15,e:"🥬"},{n:"Tomate",q:60,k:18,e:"🍅"},{n:"Sauce chien",q:20,k:25,e:"🌿"},{n:"Huile de friture",q:15,k:884,e:"🫙"}],
    steps:[
      {t:"Prépare la pâte à bokit",d:"Mélange 120g de farine, 1 sachet de levure, une pincée de sel et de l'eau tiède progressivement. Pétris jusqu'à obtenir une pâte souple et non collante.",ings:[0]},
      {t:"Laisse lever la pâte",d:"Couvre d'un torchon propre et laisse reposer dans un endroit chaud pendant 1 heure. La pâte doit doubler de volume.",ings:[]},
      {t:"Fais frire le bokit",d:"Forme des disques de 1 cm d'épaisseur. Chauffe 15g d'huile dans une casserole profonde à 180°C. Fais frire les disques 3-4 min de chaque côté jusqu'à dorure.",ings:[5]},
      {t:"Prépare la garniture",d:"Grille 150g de poulet mariné (ail, citron vert, piment, cive, persil). Lave et sèche 30g de salade, coupe 60g de tomate en rondelles.",ings:[1,2,3]},
      {t:"Assemble et sers",d:"Ouvre le bokit en deux. Garnis avec le poulet, la salade, la tomate et la sauce chien. Déguste immédiatement pendant que c'est chaud !",ings:[4]},
    ]},
    {nom:"Colombo de poulet",emoji:"🍛",desc:"Curry antillais au poulet avec épices colombo, pommes de terre et courgettes.",temps:"60 min",diff:"Facile",portions:4,
    ingredients:[{n:"Poulet morceaux",q:800,k:165,e:"🍗"},{n:"Poudre colombo",q:20,k:320,e:"🌶️"},{n:"Pomme de terre",q:300,k:86,e:"🥔"},{n:"Courgette",q:200,k:17,e:"🥒"},{n:"Tomate",q:150,k:18,e:"🍅"},{n:"Ail oignon piment",q:50,k:40,e:"🧄"},{n:"Huile",q:20,k:884,e:"🫙"}],
    steps:[
      {t:"Fais revenir les aromates",d:"Dans une cocotte, chauffe 20g d'huile à feu moyen. Fais revenir l'oignon émincé et l'ail écrasé pendant 5 minutes jusqu'à transparence.",ings:[5,6]},
      {t:"Dore le poulet",d:"Ajoute les morceaux de poulet (800g) et 20g de poudre colombo. Fais dorer sur toutes les faces pendant 8 minutes en remuant régulièrement.",ings:[0,1]},
      {t:"Ajoute les légumes",d:"Incorpore les pommes de terre coupées en cubes (300g), la courgette en rondelles (200g) et la tomate concassée (150g).",ings:[2,3,4]},
      {t:"Mijote et sers",d:"Couvre à moitié d'eau, assaisonne et laisse mijoter 35-40 minutes à feu doux. Goûte et ajuste le sel et le piment. Sers avec du riz blanc.",ings:[]},
    ]},
    {nom:"Accras de morue",emoji:"🐟",desc:"Beignets de morue épicés, incontournables de l'apéritif antillais.",temps:"30 min",diff:"Facile",portions:4,
    ingredients:[{n:"Morue dessalée",q:200,k:82,e:"🐟"},{n:"Farine",q:150,k:350,e:"🌾"},{n:"Oeuf",q:55,k:155,e:"🥚"},{n:"Piment vert",q:10,k:20,e:"🌶️"},{n:"Cive et persil",q:20,k:15,e:"🌿"},{n:"Huile de friture",q:30,k:884,e:"🫙"}],
    steps:[
      {t:"Prépare la morue",d:"Effiloche finement 200g de morue dessalée. Vérifie qu'il ne reste aucune arête.",ings:[0]},
      {t:"Prépare la pâte",d:"Mélange 150g de farine, 1 oeuf, un peu d'eau gazeuse jusqu'à consistance épaisse. La pâte doit napper une cuillère.",ings:[1,2]},
      {t:"Mélange et assaisonne",d:"Incorpore la morue, 10g de piment haché finement et 20g de cive et persil ciselés. Mélange bien. Sale légèrement (la morue est déjà salée).",ings:[3,4]},
      {t:"Fais frire et sers",d:"Chauffe 30g d'huile à 175°C. Dépose des cuillerées de pâte et fais frire 2-3 min par côté jusqu'à dorure. Égoutte sur papier absorbant. Sers chaud !",ings:[5]},
    ]},
    {nom:"Gratin de banane jaune",emoji:"🍌",desc:"Bananes plantains gratinées avec béchamel et fromage fondu.",temps:"40 min",diff:"Facile",portions:4,
    ingredients:[{n:"Banane plantain jaune",q:400,k:122,e:"🍌"},{n:"Béchamel",q:200,k:120,e:"🥛"},{n:"Emmental râpé",q:60,k:382,e:"🧀"},{n:"Muscade sel poivre",q:5,k:10,e:"🌶️"}],
    steps:[
      {t:"Prépare les bananes",d:"Pèle et coupe 400g de bananes plantain en rondelles de 1 cm. Fais-les dorer dans une poêle huilée 2-3 min de chaque côté.",ings:[0]},
      {t:"Prépare la béchamel",d:"Dans une casserole, fais fondre 20g de beurre. Ajoute 20g de farine, mélange. Verse 200ml de lait chaud progressivement en fouettant. Assaisonne de muscade, sel et poivre.",ings:[1,3]},
      {t:"Monte le gratin",d:"Dispose les rondelles de banane dans un plat beurré. Nappe généreusement de béchamel. Parsème de 60g d'emmental râpé.",ings:[2]},
      {t:"Gratine et sers",d:"Enfourne à 200°C pendant 20 minutes jusqu'à ce que le dessus soit bien doré et bouillonnant. Laisse reposer 5 min avant de servir.",ings:[]},
    ]},
    {nom:"Poulet boucané",emoji:"🍗",desc:"Poulet fumé à la canne à sucre, emblème de la cuisine guadeloupéenne.",temps:"90 min",diff:"Difficile",portions:4,

    steps:[
      {t:"Marine le poulet",d:"Mélange jus de citron, ail écrasé, piment, herbes et sel. Badigeonne généreusement le poulet entier (1200g) à l'intérieur et à l'extérieur. Marine minimum 12 heures au frigo.",ings:[0,1]},
      {t:"Prépare le fumoir",d:"Dispose des morceaux de canne à sucre (100g) dans le fond d'un grand wok ou d'une casserole en fonte. Pose une grille au-dessus.",ings:[2]},
      {t:"Fume le poulet",d:"Pose le poulet sur la grille. Couvre hermétiquement avec du papier aluminium. Fais chauffer à feu moyen jusqu'à apparition de fumée, puis baisse le feu.",ings:[]},
      {t:"Termine la cuisson",d:"Maintiens à feu doux pendant 1h30. Le poulet doit être bien cuit à coeur (70°C) et avoir une belle couleur ambrée. Sers avec des légumes pays.",ings:[]},
    ]},
    {nom:"Soupe Z'habitant",emoji:"🥣",desc:"Soupe créole traditionnelle avec légumes pays, viande salée et dombres.",temps:"75 min",diff:"Moyen",portions:6,
    ingredients:[{n:"Viande de porc salée",q:300,k:290,e:"🥩"},{n:"Igname",q:200,k:118,e:"🍠"},{n:"Patate douce",q:200,k:90,e:"🍠"},{n:"Farine pour dombres",q:100,k:350,e:"🌾"},{n:"Cive thym piment",q:30,k:20,e:"🌿"}],
    steps:[
      {t:"Dessale la viande",d:"Trempe 300g de viande de porc salée dans de l'eau froide pendant au moins 3 heures en changeant l'eau 2-3 fois. Coupe en gros cubes.",ings:[0]},
      {t:"Lance le bouillon",d:"Place la viande dans une grande marmite. Couvre d'eau froide. Porte à ébullition et écume. Ajoute la cive, le thym et le piment entier.",ings:[4]},
      {t:"Ajoute les légumes",d:"Après 20 min, ajoute l'igname (200g) et la patate douce (200g) coupées en gros morceaux. Laisse mijoter 20 min supplémentaires.",ings:[1,2]},
      {t:"Prépare les dombres",d:"Mélange 100g de farine avec un peu d'eau pour former une pâte ferme. Forme de petites boules de la taille d'une noix.",ings:[3]},
      {t:"Termine et sers",d:"Plonge les dombres dans la soupe bouillonnante. Cuis encore 15 min. Goûte et ajuste le sel. Sers bien chaud dans des bols profonds.",ings:[]},
    ]},

  senegal:[
    {nom:"Thiéboudienne",emoji:"🍚",desc:"Plat national sénégalais : riz au poisson et légumes dans une sauce tomate.",temps:"90 min",diff:"Difficile",portions:6,
    ingredients:[{n:"Riz brisé",q:500,k:350,e:"🍚"},{n:"Poisson thiof",q:600,k:100,e:"🐟"},{n:"Tomate concentrée",q:80,k:80,e:"🍅"},{n:"Légumes manioc carotte navet",q:400,k:50,e:"🥕"},{n:"Ail oignon piment",q:80,k:40,e:"🧄"},{n:"Huile d'arachide",q:60,k:900,e:"🫙"}],
    steps:[

      {t:"Cuis les légumes",d:"Ajoute les légumes (400g) dans la sauce tomate. Couvre d'eau et laisse mijoter 25 min. Retire les légumes et réserve.",ings:[3]},

      {t:"Assemble et sers",d:"Dispose le riz au centre du plat. Arrange le poisson et les légumes autour. Sers avec une sauce citron piment à part.",ings:[]},
    ]},
    {nom:"Yassa Poulet",emoji:"🍋",desc:"Poulet mariné au citron et oignons caramélisés, servi avec du riz blanc.",temps:"60 min",diff:"Facile",portions:4,
    ingredients:[{n:"Poulet morceaux",q:800,k:165,e:"🍗"},{n:"Oignons",q:400,k:40,e:"🧅"},{n:"Jus de citron",q:80,k:20,e:"🍋"},{n:"Moutarde",q:20,k:70,e:"🫙"},{n:"Ail piment",q:20,k:40,e:"🧄"},{n:"Huile",q:30,k:884,e:"🫙"},{n:"Riz cuit",q:600,k:130,e:"🍚"}],
    steps:[
      {t:"Marine le poulet",d:"Mélange jus de citron (80g), moutarde (20g), ail et piment (20g). Badigeonne les morceaux de poulet (800g) et laisse mariner minimum une nuit au frigo.",ings:[0,2,3,4]},
      {t:"Grille le poulet",d:"Retire le poulet de la marinade (garde-la !). Grille les morceaux au four à 200°C ou sur plancha jusqu'à coloration dorée. Réserve.",ings:[0]},
      {t:"Caramélise les oignons",d:"Dans une grande poêle, verse 30g d'huile. Ajoute les oignons émincés (400g) et laisse cuire à feu doux 25-30 min en remuant souvent jusqu'à belle coloration.",ings:[1,5]},
      {t:"Mijote ensemble",d:"Ajoute le poulet grillé aux oignons. Verse la marinade réservée. Couvre et laisse mijoter 20 min à feu doux.",ings:[]},
      {t:"Sers avec le riz",d:"Dispose le riz (600g cuit) dans les assiettes. Pose les morceaux de poulet dessus et nappe généreusement d'oignons caramélisés.",ings:[6]},

let paysActif=null;
let recetteActive=null;
let stepActif=0;

function renderPays(){
  const el=document.getElementById('pays-grid');
  el.innerHTML=PAYS.map(p=>`<button class="pays-btn${paysActif===p.id?' active':''}" onclick="selectPays('${p.id}')">${p.flag} ${p.nom}</button>`).join('');
}

function selectPays(id){
  paysActif=id;
  renderPays();
  renderRecettes();
}

function totalKcal(recette){
  return Math.round(recette.ingredients.reduce((s,i)=>s+(i.k*i.q/100),0)/recette.portions);
}

function renderRecettes(){
  const el=document.getElementById('recettes-grid');
  if(!paysActif){el.innerHTML='';return;}
  const liste=RECETTES[paysActif]||[];
  el.innerHTML=liste.map((r,i)=>`
    <div class="recette-card" onclick="openModal(${i})">
      <div class="recette-emoji">${r.emoji}</div>
      <div class="recette-nom">${r.nom}</div>
      <div class="recette-desc">${r.desc}</div>
      <div class="recette-meta">
        <span class="tag tag-kcal">~${totalKcal(r)} kcal/pers</span>
        <span class="tag tag-time">⏱ ${r.temps}</span>
        <span class="tag tag-diff">${r.diff}</span>
      </div>
    </div>
  `).join('');
}

function openModal(i){
  recetteActive=RECETTES[paysActif][i];
  const r=recetteActive;
  const total=totalKcal(r);
  const modal=document.getElementById('modal');
  modal.innerHTML=`
    <div class="modal-top">
      <div>
        <div class="modal-emoji">${r.emoji}</div>
        <div class="modal-nom">${r.nom}</div>
        <div class="modal-pays">${PAYS.find(p=>p.id===paysActif).flag} ${PAYS.find(p=>p.id===paysActif).nom} · ${r.temps} · ${r.diff}</div>
      </div>
      <button class="close-btn" onclick="closeModalBtn()">✕</button>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Ingrédients (pour ${r.portions} personne${r.portions>1?'s':''})</div>
      <div class="ingredient-list">
        ${r.ingredients.map(ing=>`
          <div class="ingredient-row">
            <span class="ingredient-name">${ing.e} ${ing.n}</span>
            <div class="ingredient-right">
              <span class="ingredient-qty">${ing.q}g</span>
              <span class="ingredient-kcal">${Math.round(ing.k*ing.q/100)} kcal</span>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="total-bar">
        <span class="total-label">Total par personne</span>
        <span class="total-val">~${total} kcal</span>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Étapes (${r.steps.length} étapes)</div>
      <div class="steps-list">
        ${r.steps.map((s,i)=>`<div class="step"><div class="step-num">${i+1}</div><div><strong>${s.t}</strong> — ${s.d}</div></div>`).join('')}
      </div>
    </div>
    <button class="btn-start" onclick="startCook()">👨‍🍳 Commencer la recette étape par étape →</button>
  `;
  document.getElementById('modal-bg').classList.add('open');
}

function closeModalBtn(){document.getElementById('modal-bg').classList.remove('open');}
function closeModalOutside(e){if(e.target===document.getElementById('modal-bg'))closeModalBtn();}

function startCook(){
  closeModalBtn();
  stepActif=0;
  renderCookStep();
  document.getElementById('cook-bg').classList.add('open');
  document.getElementById('cook-done').style.display='none';
  document.getElementById('cook-body').style.display='block';
  document.getElementById('cook-footer').style.display='grid';
}

function renderCookStep(){
  const r=recetteActive;
  const step=r.steps[stepActif];
  const total=r.steps.length;
  const pct=Math.round((stepActif+1)/total*100);

  document.getElementById('cook-title').textContent=r.emoji+' '+r.nom;
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('progress-label').textContent='Étape '+(stepActif+1)+' sur '+total;
  document.getElementById('cook-prev').disabled=stepActif===0;
  document.getElementById('cook-next').textContent=stepActif===total-1?'Terminer 🎉':'Suivant →';

  const ingsStep=step.ings.map(i=>r.ingredients[i]);

  document.getElementById('cook-body').innerHTML=`
    <div class="cook-step-num">Étape ${stepActif+1} — ${step.t}</div>
    <div class="cook-step-text">${step.d}</div>
    ${ingsStep.length?`
      <div class="cook-ingredients-title">🧺 Ingrédients pour cette étape</div>
      <div class="cook-ing-grid">
        ${ingsStep.map(ing=>`
          <div class="cook-ing-card">
            <div class="cook-ing-emoji">${ing.e}</div>
            <div class="cook-ing-name">${ing.n}</div>
            <div class="cook-ing-qty">${ing.q}g</div>
            <div class="cook-ing-kcal">${Math.round(ing.k*ing.q/100)} kcal</div>
          </div>
        `).join('')}
      </div>
    `:'<div class="cook-tip"><strong>💡 Astuce :</strong> Cette étape ne nécessite pas d\'ingrédients supplémentaires. Concentre-toi sur la technique !</div>'}
  `;
}

function nextStep(){
  const total=recetteActive.steps.length;
  if(stepActif<total-1){
    stepActif++;
    renderCookStep();
    document.getElementById('cook-body').scrollTop=0;
  } else {
    document.getElementById('cook-body').style.display='none';
    document.getElementById('cook-footer').style.display='none';
    document.getElementById('cook-done').style.display='flex';
    document.getElementById('cook-done-desc').textContent='Bravo ! Tu as préparé un délicieux '+recetteActive.nom+'. Bon appétit ! 🍽️';
  }
}

function prevStep(){
  if(stepActif>0){
    stepActif--;
    renderCookStep();
    document.getElementById('cook-body').scrollTop=0;
  }
}

function closeCook(){
  document.getElementById('cook-bg').classList.remove('open');
}

renderPays();
</script>
</body>
</html>
