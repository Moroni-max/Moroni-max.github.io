<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack – Profil</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#080808;color:#f0f0f0;padding:1rem;max-width:600px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:0.5px solid #1a1a1a}
.back{color:#555;font-size:13px;text-decoration:none}.back:hover{color:#f0f0f0}
.logo-text{font-size:16px;font-weight:900;letter-spacing:-0.5px}.logo-text span{color:#00FF87}
.card{background:#111;border:0.5px solid #1a1a1a;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
.section-title{font-weight:700;font-size:14px;margin-bottom:12px;letter-spacing:-0.3px}
.profil-hero{display:flex;align-items:center;gap:1rem;margin-bottom:12px;background:#111;border:0.5px solid #1a1a1a;border-radius:16px;padding:1.25rem}
.profil-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;flex-shrink:0}
.profil-info h2{font-size:22px;font-weight:900;letter-spacing:-0.5px;margin-bottom:4px}
.profil-info p{font-size:13px;color:#555}
.profil-badge{display:inline-block;margin-top:6px;font-size:11px;padding:2px 10px;border-radius:99px;font-weight:600;background:rgba(0,255,135,0.1);color:#00FF87}
.stats-global{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.stat-glob{background:#111;border:0.5px solid #1a1a1a;border-radius:10px;padding:12px;text-align:center}
.stat-glob-val{font-size:22px;font-weight:700;margin-bottom:2px}
.stat-glob-label{font-size:11px;color:#555;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.notif{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:8px;font-size:13px;line-height:1.5}
.notif-ok{background:rgba(0,255,135,0.05);border:0.5px solid rgba(0,255,135,0.15)}
.notif-warn{background:rgba(239,159,39,0.05);border:0.5px solid rgba(239,159,39,0.15)}
.notif-info{background:rgba(100,150,255,0.05);border:0.5px solid rgba(100,150,255,0.15)}
.notif-icon{font-size:18px;flex-shrink:0}
.notif-text strong{display:block;font-weight:700;margin-bottom:2px}
.notif-text span{color:#666}
.chart-wrap{height:160px;margin-top:8px}
.streak-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid #1a1a1a;font-size:13px}
.streak-row:last-child{border-bottom:none}
.streak-label{color:#888}
.streak-val{font-weight:700;color:#00FF87}
.switch-profils{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.switch-btn{padding:8px 16px;border:1.5px solid #222;border-radius:99px;background:transparent;color:#888;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px;transition:all 0.2s}
.switch-btn:hover{border-color:#444;color:#f0f0f0}
.switch-btn.active{border-color:#00FF87;color:#00FF87;background:rgba(0,255,135,0.05)}
.mini-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.no-profile{text-align:center;padding:3rem 1rem}
.no-profile h2{font-size:20px;font-weight:700;margin-bottom:8px}
.no-profile p{color:#555;font-size:14px;margin-bottom:1.5rem}
.btn-home{display:inline-block;padding:12px 24px;background:#00FF87;color:#080808;border-radius:10px;font-weight:700;font-size:14px;text-decoration:none}
.empty{text-align:center;padding:1.5rem;color:#444;font-size:13px}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back">← Accueil</a>
  <div class="logo-text">Fit<span>Track</span></div>
  <span style="font-size:13px;color:#555">Profil</span>
</div>

<div id="no-profile" style="display:none" class="no-profile">
  <h2>Aucun profil sélectionné</h2>
  <p>Retourne à l'accueil pour choisir ton profil.</p>
  <a href="index.html" class="btn-home">Choisir mon profil →</a>
</div>

<div id="app" style="display:none">
  <div class="switch-profils" id="switch-profils"></div>
  <div class="profil-hero" id="profil-hero"></div>
  <div class="stats-global" id="stats-global"></div>
  <div class="card">
    <p class="section-title">💬 Notifications & conseils</p>
    <div id="notifs"></div>
  </div>
  <div class="card">
    <p class="section-title">🔥 Régularité</p>
    <div id="streaks"></div>
  </div>
  <div class="card">
    <p class="section-title">📊 Calories — 7 derniers jours</p>
    <div class="chart-wrap"><canvas id="chart-kcal"></canvas></div>
  </div>
  <div class="card">
    <p class="section-title">🏃 Running — progression allure</p>
    <div class="chart-wrap" id="chart-run-wrap"><canvas id="chart-run"></canvas></div>
  </div>
</div>

<script>
const COLORS=[
  {bg:'rgba(0,255,135,0.15)',color:'#00FF87'},
  {bg:'rgba(255,100,150,0.15)',color:'#ff6496'},
  {bg:'rgba(100,150,255,0.15)',color:'#6496ff'},
  {bg:'rgba(255,165,0,0.15)',color:'#ffa500'},
  {bg:'rgba(200,100,255,0.15)',color:'#c864ff'},
  {bg:'rgba(255,80,80,0.15)',color:'#ff5050'},
  {bg:'rgba(0,200,255,0.15)',color:'#00c8ff'},
  {bg:'rgba(255,220,0,0.15)',color:'#ffdc00'},
  {bg:'rgba(100,220,100,0.15)',color:'#64dc64'},
  {bg:'rgba(255,150,50,0.15)',color:'#ff9632'},
];

let profiles=JSON.parse(localStorage.getItem('fittrack_profiles')||'[]');
let currentUser=localStorage.getItem('fittrack_user')||null;
let chartKcalInstance=null;
let chartRunInstance=null;

if(!profiles.length||!currentUser){
  document.getElementById('no-profile').style.display='block';
} else {
  document.getElementById('app').style.display='block';
  renderSwitchBtns();
  renderProfil(currentUser);
}

function getColor(p){return COLORS[p.colorIdx||0];}
function getInitial(name){return name?name[0].toUpperCase():'?';}
function today(){return new Date().toISOString().slice(0,10);}
function getDays(n){
  const days=[];
  for(let i=n-1;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().slice(0,10));}
  return days;
}

function renderSwitchBtns(){
  document.getElementById('switch-profils').innerHTML=profiles.map(p=>{
    const c=getColor(p);
    return `<button class="switch-btn${currentUser===p.id?' active':''}" onclick="switchProfil('${p.id}')">
      <div class="mini-avatar" style="background:${c.bg};color:${c.color}">${getInitial(p.name)}</div>
      ${p.name}
    </button>`;
  }).join('');
}

function switchProfil(id){
  currentUser=id;
  localStorage.setItem('fittrack_user',id);
  renderSwitchBtns();
  renderProfil(id);
}

function renderProfil(userId){
  const profile=profiles.find(p=>p.id===userId);
  if(!profile)return;
  const c=getColor(profile);
  const calEntries=JSON.parse(localStorage.getItem('cal_entries_'+userId)||'[]');
  const runSessions=JSON.parse(localStorage.getItem('run_sessions_'+userId)||'[]');
  const goalKcal=parseInt(localStorage.getItem('cal_goal_'+userId)||profile.goal||2000);
  const goalProt=parseInt(localStorage.getItem('cal_prot_goal_'+userId)||profile.protGoal||120);

  const joursCalories=new Set(calEntries.map(e=>e.date)).size;
  document.getElementById('profil-hero').innerHTML=`
    <div class="profil-avatar" style="background:${c.bg};color:${c.color};border:2px solid ${c.color}40">${getInitial(profile.name)}</div>
    <div class="profil-info">
      <h2>${profile.name}</h2>
      <p>${profile.objectif||'Profil FitTrack'}</p>
      <span class="profil-badge">⚡ ${joursCalories} jours trackés · ${runSessions.length} séances running</span>
    </div>`;

  const totalKcal=Math.round(calEntries.reduce((s,e)=>s+e.kcal,0));
  const totalProt=Math.round(calEntries.reduce((s,e)=>s+e.prot,0));
  const totalKm=runSessions.reduce((s,r)=>s+r.dist,0).toFixed(1);
  const totalRunCal=runSessions.reduce((s,r)=>s+r.cal,0);
  const moyKcal=joursCalories?Math.round(totalKcal/joursCalories):0;

  document.getElementById('stats-global').innerHTML=`
    <div class="stat-glob"><div class="stat-glob-val" style="color:${c.color}">${totalKcal.toLocaleString()}</div><div class="stat-glob-label">kcal totales</div></div>
    <div class="stat-glob"><div class="stat-glob-val" style="color:#6496ff">${totalProt}g</div><div class="stat-glob-label">Protéines</div></div>
    <div class="stat-glob"><div class="stat-glob-val">${totalKm}</div><div class="stat-glob-label">km courus</div></div>
    <div class="stat-glob"><div class="stat-glob-val">${moyKcal}</div><div class="stat-glob-label">Moy kcal/j</div></div>
    <div class="stat-glob"><div class="stat-glob-val" style="color:#ffa500">${totalRunCal.toLocaleString()}</div><div class="stat-glob-label">kcal running</div></div>
    <div class="stat-glob"><div class="stat-glob-val">${runSessions.length}</div><div class="stat-glob-label">Séances</div></div>`;

  renderNotifs(calEntries,runSessions,goalKcal,goalProt,c);
  renderStreaks(calEntries,runSessions,goalKcal);
  renderChartKcal(calEntries,goalKcal,c);
  renderChartRun(runSessions,c);
}

function renderNotifs(calEntries,runSessions,goalKcal,goalProt,c){
  const notifs=[];
  const tod=today();
  const todayEntries=calEntries.filter(e=>e.date===tod);
  const todayKcal=Math.round(todayEntries.reduce((s,e)=>s+e.kcal,0));
  const todayProt=Math.round(todayEntries.reduce((s,e)=>s+e.prot,0));

  if(!todayEntries.length){
    notifs.push({type:'warn',icon:'🍽️',title:'Aucun repas enregistré aujourd\'hui',text:'Lance le compteur de calories pour commencer !'});
  } else if(todayKcal>=goalKcal){
    notifs.push({type:'ok',icon:'✅',title:'Objectif calories atteint !',text:`${todayKcal} kcal sur ${goalKcal} kcal visés.`});
  } else {
    notifs.push({type:'info',icon:'🔥',title:`${todayKcal} kcal aujourd'hui`,text:`Il te reste ${goalKcal-todayKcal} kcal pour atteindre ton objectif.`});
  }

  if(todayEntries.length){
    if(todayProt>=goalProt){
      notifs.push({type:'ok',icon:'💪',title:'Objectif protéines atteint !',text:`${todayProt}g / ${goalProt}g. Parfait pour la récupération !`});
    } else {
      notifs.push({type:'warn',icon:'💪',title:`Protéines : ${todayProt}g / ${goalProt}g`,text:`Il manque ${goalProt-todayProt}g. Pense au skyr, poulet ou thon.`});
    }
  }

  const now=new Date();
  const weekStart=new Date(now);
  weekStart.setDate(now.getDate()-now.getDay()+1);
  const weekStr=weekStart.toISOString().slice(0,10);
  const sessionsWeek=runSessions.filter(s=>s.date>=weekStr);
  if(!sessionsWeek.length){
    notifs.push({type:'warn',icon:'🏃',title:'Pas de running cette semaine',text:'Lance une séance pour maintenir ta progression !'});
  } else {
    const kmWeek=sessionsWeek.reduce((s,r)=>s+r.dist,0).toFixed(1);
    notifs.push({type:'ok',icon:'🏃',title:`${sessionsWeek.length} séance${sessionsWeek.length>1?'s':''} cette semaine`,text:`${kmWeek} km parcourus. Continue !`});
  }

  const days7=getDays(7);
  const joursTrackes=days7.filter(d=>calEntries.some(e=>e.date===d)).length;
  if(joursTrackes>=6){
    notifs.push({type:'ok',icon:'🔥',title:`Streak ${joursTrackes}/7 jours !`,text:'Excellente régularité sur la semaine !'});
  } else if(joursTrackes>=4){
    notifs.push({type:'info',icon:'📊',title:`${joursTrackes}/7 jours trackés`,text:'Bonne régularité ! Essaie de tracker tous les jours.'});
  }

  document.getElementById('notifs').innerHTML=notifs.map(n=>`
    <div class="notif notif-${n.type}">
      <div class="notif-icon">${n.icon}</div>
      <div class="notif-text"><strong>${n.title}</strong><span>${n.text}</span></div>
    </div>`).join('');
}

function renderStreaks(calEntries,runSessions,goalKcal){
  const allDates=new Set(calEntries.map(e=>e.date));
  let streakCal=0;
  for(let i=0;i<30;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    if(allDates.has(d.toISOString().slice(0,10)))streakCal++;
    else break;
  }
  let bestStreak=0,cur=0;
  getDays(30).forEach(d=>{if(allDates.has(d)){cur++;bestStreak=Math.max(bestStreak,cur);}else cur=0;});

  const days7=getDays(7);
  const joursObj=days7.filter(d=>{
    const k=Math.round(calEntries.filter(e=>e.date===d).reduce((s,e)=>s+e.kcal,0));
    return k>0&&k<=goalKcal*1.1;
  }).length;

  const moisStr=new Date().toISOString().slice(0,7);
  const sessionsMois=runSessions.filter(s=>s.date.startsWith(moisStr));
  const kmMois=sessionsMois.reduce((s,r)=>s+r.dist,0).toFixed(1);

  document.getElementById('streaks').innerHTML=`
    <div class="streak-row"><span class="streak-label">🔥 Streak actuel</span><span class="streak-val">${streakCal} jour${streakCal>1?'s':''}</span></div>
    <div class="streak-row"><span class="streak-label">🏆 Meilleur streak (30j)</span><span class="streak-val">${bestStreak} jour${bestStreak>1?'s':''}</span></div>
    <div class="streak-row"><span class="streak-label">✅ Jours objectif atteint (7j)</span><span class="streak-val">${joursObj}/7</span></div>
    <div class="streak-row"><span class="streak-label">🏃 Séances ce mois</span><span class="streak-val">${sessionsMois.length}</span></div>
    <div class="streak-row"><span class="streak-label">📍 Km ce mois</span><span class="streak-val">${kmMois} km</span></div>`;
}

function renderChartKcal(calEntries,goalKcal,c){
  const days=getDays(7);
  const labels=days.map(d=>{const p=d.split('-');return p[2]+'/'+p[1];});
  const vals=days.map(d=>Math.round(calEntries.filter(e=>e.date===d).reduce((s,e)=>s+e.kcal,0)));
  const ctx=document.getElementById('chart-kcal').getContext('2d');
  if(chartKcalInstance)chartKcalInstance.destroy();
  chartKcalInstance=new Chart(ctx,{
    data:{labels,datasets:[
      {type:'bar',data:vals,backgroundColor:vals.map(v=>v>goalKcal?'rgba(226,75,74,0.7)':c.color+'80'),borderRadius:6},
      {type:'line',data:days.map(()=>goalKcal),borderColor:c.color,borderDash:[5,5],pointRadius:0,borderWidth:1.5}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#444',font:{size:11}}},y:{ticks:{color:'#444',font:{size:11}},grid:{color:'#1a1a1a'}}}}
  });
}

function formatRythme(s){const m=Math.floor(s/60);const sec=Math.round(s%60);return m+"'"+String(sec).padStart(2,'0')+'"';}
function rythmeToSec(str){if(!str||str==='—')return 0;const c=str.replace('"','').split("'");return parseInt(c[0])*60+(parseInt(c[1])||0);}

function renderChartRun(runSessions,c){
  const sorted=[...runSessions].filter(s=>s.rythme&&s.rythme!=='—').sort((a,b)=>a.date.localeCompare(b.date)).slice(-8);
  const wrap=document.getElementById('chart-run-wrap');
  if(chartRunInstance)chartRunInstance.destroy();
  if(sorted.length<2){wrap.innerHTML='<p style="font-size:13px;color:#444;text-align:center;padding:1.5rem">Ajoute au moins 2 séances pour voir la progression.</p>';return;}
  if(!wrap.querySelector('canvas'))wrap.innerHTML='<canvas id="chart-run"></canvas>';
  const ctx=document.getElementById('chart-run').getContext('2d');
  chartRunInstance=new Chart(ctx,{
    data:{labels:sorted.map(s=>s.date.split('-').slice(1).reverse().join('/')),datasets:[{type:'line',data:sorted.map(s=>rythmeToSec(s.rythme)),borderColor:c.color,backgroundColor:c.color+'10',borderWidth:2,pointBackgroundColor:c.color,pointRadius:5,tension:0.3,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>formatRythme(ctx.raw)+' /km'}}},scales:{x:{ticks:{color:'#444',font:{size:11}},grid:{color:'#1a1a1a'}},y:{reverse:true,ticks:{color:'#444',font:{size:11},callback:v=>formatRythme(v)},grid:{color:'#1a1a1a'}}}}
  });
}
</script>
</body>
</html>
